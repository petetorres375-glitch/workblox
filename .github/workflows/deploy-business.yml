name: Deploy Business Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'business/**'
      - '.github/workflows/deploy-business.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: business
        run: npm ci

      - name: Build
        working-directory: business
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_BIZ_GOOGLE_CLIENT_ID }}
        run: node_modules/.bin/vite build

      - name: Deploy to workblox-business repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.BUSINESS_DEPLOY_TOKEN }}
          external_repository: petetorres375-glitch/workblox-business
          publish_branch: gh-pages
          publish_dir: business/dist
          cname: business.torrestechremote.com
